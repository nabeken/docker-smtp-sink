services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:74cb483119adccbbc978438394931201370a0b135af9cad2e43145b7453aa1ce
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
