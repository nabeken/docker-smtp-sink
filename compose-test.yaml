services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:6df2362377dfecb273dffc722b109602cdf3609f0477df10540b15eb75a5daff
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
