services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:3c7dbfb7d0a5d5c8f0328c7fded4bc4791a7a1a43c125b7671973d859915dff6
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
