services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:a02d4e4a1b193c210d8c6458037a5c27408f25e4e88edc12aa0a519c2f1cdc99
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
