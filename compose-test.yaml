services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:9529ff7d8737f52405d2384e6ed22d4ade8f63172d4a2662b81664e2131336cd
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
