services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:efe3a9b4ad5177bc41ebc6082f250882e42bc1064664df1bd4519f28221ec89e
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
