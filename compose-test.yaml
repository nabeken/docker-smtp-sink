services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:a824a5ee4071ffbe9c53be6c7b10fb2ed3dc8bb527db5374c62dade4426ec6ec
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
