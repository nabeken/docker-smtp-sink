services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:e52f03b50176d6e9379aabc2d84cf1664acd1f7be8b21bc32a39d76daf9b75b6
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
