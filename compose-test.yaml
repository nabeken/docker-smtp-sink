services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:1f3d3cca59b7af2c6d51454d2ea153a29294600d652a3a68a9a06e8eed8567f3
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
