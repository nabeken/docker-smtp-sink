services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:8f850b10d6740f095e7995da8028c93d7d113112a1c223135d6594a66010fac9
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
