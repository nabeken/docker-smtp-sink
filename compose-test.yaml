services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:0dd19f0b44f47f97e8452f72e4f3580892ebde4ee596b1b7c577cda3eb84bb01
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
