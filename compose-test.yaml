services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:38aba8b8d417027435e59534285772d737eaf32099bd8ef4b8763caaf3eed99e
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
