services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:871b4725f8f077fd112e8f066be5036c1f6c2d0ce06e62cf4cdf2715c17f194f
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
