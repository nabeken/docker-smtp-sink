services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:2139b3cd09a33223e57374535a7c117578265ca2569b6f7756b883e3f81ef8df
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
