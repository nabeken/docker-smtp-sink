services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:a2fbc64f9e54dd9c8a1490883cf05f41ddcbcb9cd3fde1da4e893cef312fc40a
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
