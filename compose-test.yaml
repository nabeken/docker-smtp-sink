services:
  rsync:
    image: ghcr.io/nabeken/docker-volume-container-rsync:latest@sha256:77a7b66e8fbddae6049d2dddac219a4781e58a6c03f5d743ce7d030a12a1c364
    volumes:
      - vol:/docker
    ports:
      - "10873:873"

  sink:
    image: ghcr.io/nabeken/docker-smtp-sink:action-local-test
    volumes:
      - vol:/sink
    ports:
      - "10025:10025"
    command: ["-v", "-h", "mx.example.com", "-m", "100", "-d", "/sink/", ":10025", "100"]

volumes:
  vol:
